name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0). If empty, a draft is created from HEAD."
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-glob: "release/*.exe"
          - os: macos-latest
            artifact-glob: "release/*.dmg"
          - os: ubuntu-latest
            artifact-glob: "release/*.AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build renderer
        run: npm run build:renderer

      - name: Build electron main
        run: npm run build:electron

      # electron-builder reads electron-builder.json. Icons are committed under
      # build/, so we don't need to run build:icons here.
      - name: Package
        env:
          # Suppress the auto-publish path; we attach artefacts manually below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-installers
          merge-multiple: true

      - name: List downloaded artefacts
        run: ls -la dist-installers/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
