name: CI

on:
  push:
    branches: [main]
  pull_request:

# Don't download the ~80MB Electron binary in CI — we never run the
# Electron shell here. Renderer + tests + typecheck only.
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (renderer + electron)
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Renderer build
        run: npm run build:renderer

      # Playwright browsers are cached by the playwright action's hash of
      # @playwright/test in package-lock.json; first run on a new SHA pays
      # the ~30s download, subsequent runs restore from cache instantly.
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(npm view @playwright/test version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
