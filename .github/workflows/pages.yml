name: Deploy renderer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required by actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment at a time; cancel
# in-progress only on workflow_dispatch reruns (not pushes), to avoid
# losing a deploy mid-flight when commits land rapidly.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        # vite.config.ts uses `base: "./"`, so the same build works under
        # any subpath (Electron's file:// or Pages' /<repo>/). No env
        # override needed for the Pages subdir.
        run: npm run build:renderer

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
